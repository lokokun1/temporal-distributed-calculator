apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: temporal-calc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/admin-tools:latest
          imagePullPolicy: IfNotPresent
          command: ["temporal"]
          args: ["server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - name: grpc
              containerPort: 7233
            - name: ui
              containerPort: 8233
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: temporal-calc
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
    - name: ui
      port: 8233
      targetPort: ui
